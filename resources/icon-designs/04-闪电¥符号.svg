<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fc466b"/>
      <stop offset="100%" stop-color="#3f5efb"/>
    </linearGradient>
    <filter id="glow4">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 圆角方形背景 - 渐变紫红 -->
  <rect x="40" y="40" width="432" height="432" rx="96" ry="96" fill="url(#bg4)"/>
  <!-- ¥ 符号化身为闪电 -->
  <g filter="url(#glow4)">
    <!-- ¥ 的上横线 + 闪电 -->
    <path d="M160,150 L256,220 L352,150" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- ¥ 的中竖线 + 变成闪电 -->
    <path d="M256,150 L256,280 L180,380 L256,280 L320,380" fill="none" stroke="#ffd700" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- ¥ 的下横线 -->
    <path d="M180,290 L332,290" fill="none" stroke="#fff" stroke-width="18" stroke-linecap="round"/>
  </g>
</svg>
