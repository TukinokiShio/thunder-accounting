<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- 账本封面渐变 - 暖棕色 -->
    <linearGradient id="cover" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a574"/>
      <stop offset="100%" stop-color="#b8845a"/>
    </linearGradient>
    <!-- 书页渐变 - 米白/奶油色 -->
    <linearGradient id="pages" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fef9f0"/>
      <stop offset="100%" stop-color="#f5ead5"/>
    </linearGradient>
    <!-- 铜钱渐变 -->
    <linearGradient id="coin" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8a820"/>
      <stop offset="50%" stop-color="#f5c842"/>
      <stop offset="100%" stop-color="#c4881a"/>
    </linearGradient>
    <!-- 闪电渐变 -->
    <linearGradient id="lightning" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff176"/>
      <stop offset="30%" stop-color="#ffd700"/>
      <stop offset="70%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#e67e00"/>
    </linearGradient>
  </defs>

  <!-- 圆角方形外框 - 账本封面（加粗边框替代阴影） -->
  <rect x="40" y="40" width="432" height="432" rx="96" ry="96" fill="url(#cover)" stroke="#9b6a3a" stroke-width="4"/>

  <!-- 账本内部书页（左侧页） -->
  <rect x="56" y="56" width="180" height="400" rx="56" fill="url(#pages)"/>
  <!-- 书页横线 -->
  <line x1="80" y1="120" x2="200" y2="120" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="80" y1="160" x2="200" y2="160" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="80" y1="200" x2="200" y2="200" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="80" y1="240" x2="200" y2="240" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="80" y1="280" x2="200" y2="280" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="80" y1="320" x2="200" y2="320" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="80" y1="360" x2="200" y2="360" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="80" y1="400" x2="200" y2="400" stroke="#d4c5a0" stroke-width="2"/>

  <!-- 书脊中线 -->
  <line x1="246" y1="56" x2="246" y2="456" stroke="#8b6914" stroke-width="2" opacity="0.4"/>

  <!-- 账本内部书页（右侧页） -->
  <rect x="276" y="56" width="180" height="400" rx="56" fill="url(#pages)"/>
  <!-- 书页横线 -->
  <line x1="300" y1="120" x2="420" y2="120" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="300" y1="160" x2="420" y2="160" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="300" y1="200" x2="420" y2="200" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="300" y1="240" x2="420" y2="240" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="300" y1="280" x2="420" y2="280" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="300" y1="320" x2="420" y2="320" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="300" y1="360" x2="420" y2="360" stroke="#d4c5a0" stroke-width="2"/>
  <line x1="300" y1="400" x2="420" y2="400" stroke="#d4c5a0" stroke-width="2"/>

  <!-- 账本封面边框装饰 -->
  <rect x="52" y="52" width="408" height="408" rx="84" ry="84" fill="none" stroke="#9b6a3a" stroke-width="3" opacity="0.6"/>

  <!-- 铜钱外圆（加粗边框替代阴影） -->
  <circle cx="256" cy="240" r="110" fill="url(#coin)" stroke="#b8781a" stroke-width="3"/>
  <!-- 铜钱中空 -->
  <circle cx="256" cy="240" r="88" fill="url(#pages)" stroke="#c4881a" stroke-width="1"/>
  <!-- 铜钱方孔 -->
  <rect x="214" y="198" width="84" height="84" rx="8" fill="url(#coin)" stroke="#b8781a" stroke-width="2"/>

  <!-- 闪电（用双层多边形替代 glow 滤镜：底层=发光模拟，上层=闪电本体） -->
  <polygon points="280,56 230,220 264,220 218,420 304,240 268,240 308,56"
    fill="#ffd700" stroke="#fff" stroke-width="4" stroke-linejoin="round" opacity="0.5"/>
  <polygon points="280,60 233,220 265,220 222,415 301,240 267,240 305,60"
    fill="url(#lightning)" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
</svg>
