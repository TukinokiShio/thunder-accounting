<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="circle5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff6b35"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 圆角方形背景 -->
  <rect x="40" y="40" width="432" height="432" rx="96" ry="96" fill="url(#bg5)"/>
  <!-- 金色圆环（代表铜钱/金币） -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#circle5)" stroke-width="12" opacity="0.8"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#circle5)" stroke-width="2" opacity="0.3"/>
  <!-- 中心极简闪电 -->
  <g filter="url(#glow5)">
    <polygon points="278,110 220,230 262,230 215,390 310,260 264,260 312,110" fill="url(#circle5)" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- 底部小方孔（铜钱元素） -->
  <rect x="236" y="380" width="40" height="40" rx="6" fill="url(#circle5)" opacity="0.5"/>
</svg>
